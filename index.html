<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RL Tracker — Session Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Barlow+Condensed:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d1320" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RL Tracker" />
  <link rel="apple-touch-icon" href="icon.png" />
</head>
<body>

  <div class="bg-overlay"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-group">
        <h1 class="site-title">RL <span>TRACKER</span></h1>
        <div class="live-badge">
          <span class="live-dot"></span>
          <span id="connection-text">SYNCHRONISATION...</span>
        </div>
      </div>
      <div class="current-session">
        <span class="session-label">DATE&nbsp;</span>
        <span class="session-date" id="current-date">-- -- ----</span>
      </div>
    </div>
  </header>

  <main class="main-content">

    <!-- SAISIE -->
    <section class="board-card entry-card">
      <div class="board-header"><h2 class="board-title">SAISIE DU MATCH</h2></div>
      <form id="match-form" class="match-form">

        <div class="teams-grid">
          <div class="team-side side-a">
            <div class="team-label">ÉQUIPE A</div>
            <select id="team-a1" class="form-input" required>
              <option value="">Joueur 1</option>
              <option>Pô</option><option>Beubeu</option><option>Matt</option><option>Bruno</option><option>Jonathan</option>
            </select>
            <select id="team-a2" class="form-input">
              <option value="">Joueur 2</option>
              <option>Pô</option><option>Beubeu</option><option>Matt</option><option>Bruno</option><option>Jonathan</option>
            </select>
            <select id="team-a3" class="form-input">
              <option value="">Joueur 3 (Optionnel)</option>
              <option>Pô</option><option>Beubeu</option><option>Matt</option><option>Bruno</option><option>Jonathan</option>
            </select>
            <input type="number" id="score-a" class="score-input" placeholder="Score A" min="0" required>
          </div>

          <div class="vs-separator">VS</div>

          <div class="team-side side-b">
            <div class="team-label">ÉQUIPE B</div>
            <select id="team-b1" class="form-input" required>
              <option value="">Joueur 1</option>
              <option>Pô</option><option>Beubeu</option><option>Matt</option><option>Bruno</option><option>Jonathan</option>
            </select>
            <select id="team-b2" class="form-input">
              <option value="">Joueur 2</option>
              <option>Pô</option><option>Beubeu</option><option>Matt</option><option>Bruno</option><option>Jonathan</option>
            </select>
            <select id="team-b3" class="form-input">
              <option value="">Joueur 3 (Optionnel)</option>
              <option>Pô</option><option>Beubeu</option><option>Matt</option><option>Bruno</option><option>Jonathan</option>
            </select>
            <input type="number" id="score-b" class="score-input" placeholder="Score B" min="0" required>
          </div>
        </div>

        <!-- BONUS -->
        <div class="bonus-row">
          <span class="bonus-label">BONUS VICTOIRE</span>
          <label class="bonus-check">
            <input type="checkbox" id="bonus-cucu" />
            <span class="checkmark"></span>
            🔴 Cucu Rouge
          </label>
          <label class="bonus-check">
            <input type="checkbox" id="bonus-clean" />
            <span class="checkmark"></span>
            🧹 Clean Sheet
          </label>
          <div class="bonus-preview" id="bonus-preview">= 1 pt</div>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">ENREGISTRER LE MATCH</button>
      </form>
    </section>

    <!-- ONGLETS -->
    <div class="tabs-nav">
      <button class="tab-btn active" data-tab="tab-global">GLOBAL</button>
      <button class="tab-btn" data-tab="tab-today">SESSION</button>
    </div>

    <!-- GLOBAL -->
    <div id="tab-global" class="tab-content active">
      <div class="board-card">
        <table class="ranking-table">
          <thead>
            <tr>
              <th>JOUEUR</th>
              <th>PTS/MJ</th>
              <th>POINTS</th>
              <th>🔴</th>
              <th>🧹</th>
              <th>MATCHS</th>
              <th>VICTOIRES</th>
              <th>DÉFAITES</th>
            </tr>
          </thead>
          <tbody id="global-ranking-body"></tbody>
        </table>
      </div>
    </div>

    <!-- SESSION (ex aujourd'hui) -->
    <div id="tab-today" class="tab-content">
      <div class="date-selector-row">
        <span class="bonus-label">SESSION DU</span>
        <select id="date-picker" class="form-input date-picker">
          <option value="">— Aucun match —</option>
        </select>
      </div>
      <div class="board-card">
        <table class="ranking-table">
          <thead>
            <tr>
              <th>JOUEUR</th>
              <th>PTS/MJ</th>
              <th>POINTS</th>
              <th>🔴</th>
              <th>🧹</th>
              <th>MATCHS</th>
              <th>VICTOIRES</th>
              <th>DÉFAITES</th>
            </tr>
          </thead>
          <tbody id="today-ranking-body"></tbody>
        </table>
      </div>
    </div>

  </main>

  <div id="success-flash" class="flash-overlay" style="display:none;">✅ MATCH ENREGISTRÉ !</div>

  <script src="app.js"></script>
  <script>
    function updateBonusPreview() {
      const cucu  = document.getElementById('bonus-cucu').checked;
      const clean = document.getElementById('bonus-clean').checked;
      const count = (cucu ? 1 : 0) + (clean ? 1 : 0);
      const pts   = count === 2 ? 4 : count === 1 ? 2 : 1;
      const el    = document.getElementById('bonus-preview');
      el.textContent = `= ${pts} pt${pts > 1 ? 's' : ''}`;
      el.className = 'bonus-preview' + (pts > 1 ? ' bonus-active' : '');
    }
    document.getElementById('bonus-cucu').addEventListener('change', updateBonusPreview);
    document.getElementById('bonus-clean').addEventListener('change', updateBonusPreview);
  </script>
</body>
</html>
